{% extends "base.html" %}
{% block title %}Sociedades Internas{% endblock %}

{% block content %}
<h1 style="margin-bottom: 20px;">Sociedades Internas</h1>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
    {% for soc in sociedades %}
    <div style="border: 2px solid #000; padding: 20px; border-radius: 15px; text-align: center;">
        <h2>{{ soc.sigla }}</h2>
        <p>{{ soc.nome }}</p>
        <a href="{{ url_for('sociedades.detalhes_sociedade', id=soc.id) }}" 
           style="display: inline-block; margin-top: 10px; padding: 5px 15px; background: #000; color: #fff; border-radius: 20px; text-decoration: none;">
           Ver Membros
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
